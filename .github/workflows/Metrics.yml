name: Metrics

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: profile-metrics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # METRICS_TOKEN should be a personal access token with enough read scopes
      # for private repositories, organizations, traffic, and projects if enabled.
      - name: Profile overview metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Eliminater74
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/New_York
          optimize: yes
          plugins_errors_fatal: no

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_threshold: C

          plugin_activity: yes
          plugin_activity_limit: 8
          plugin_activity_days: 14
          plugin_activity_filter: all

          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: graph
          plugin_habits_facts: yes

          plugin_repositories: yes
          plugin_repositories_pinned: 6
          plugin_repositories_starred: 4
          plugin_repositories_order: pinned, starred

      - name: Language activity metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Eliminater74
          filename: metrics.languages.svg
          template: classic
          base: ""
          config_timezone: America/New_York
          optimize: yes
          plugins_errors_fatal: no

          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used, recently-used
          plugin_languages_details: lines, bytes-size, percentage
          plugin_languages_categories: markup, programming
          plugin_languages_recent_categories: markup, programming
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%

      - name: Contribution calendar metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Eliminater74
          filename: metrics.calendar.svg
          template: classic
          base: ""
          config_timezone: America/New_York
          optimize: yes
          plugins_errors_fatal: no

          plugin_calendar: yes
          plugin_calendar_limit: 2

      - name: Lines changed metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Eliminater74
          filename: metrics.lines.svg
          template: classic
          base: ""
          config_timezone: America/New_York
          optimize: yes
          plugins_errors_fatal: no

          plugin_lines: yes
          plugin_lines_sections: repositories, history
          plugin_lines_repositories_limit: 6
          plugin_lines_history_limit: 2
          plugin_lines_delay: 30

      - name: Stargazers metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Eliminater74
          filename: metrics.stargazers.svg
          template: classic
          base: ""
          config_timezone: America/New_York
          optimize: yes
          plugins_errors_fatal: no

          plugin_stargazers: yes
          plugin_stargazers_days: 365
          plugin_stargazers_charts: yes
          plugin_stargazers_charts_type: graph

      - name: Starred topics metrics
        uses: lowlighter/metrics@latest
        with:
          token: NOT_NEEDED
          user: Eliminater74
          filename: metrics.topics.svg
          template: classic
          base: ""
          config_timezone: America/New_York
          optimize: yes
          plugins_errors_fatal: no

          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_sort: activity
          plugin_topics_limit: 20

      - name: Follow-up metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Eliminater74
          filename: metrics.followup.svg
          template: classic
          base: ""
          config_timezone: America/New_York
          optimize: yes
          plugins_errors_fatal: no

          plugin_followup: yes
          plugin_followup_sections: repositories, user
          plugin_followup_indepth: yes
          plugin_followup_archived: no

      - name: Reactions metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Eliminater74
          filename: metrics.reactions.svg
          template: classic
          base: ""
          config_timezone: America/New_York
          optimize: yes
          plugins_errors_fatal: no

          plugin_reactions: yes
          plugin_reactions_limit: 200
          plugin_reactions_limit_issues: 200
          plugin_reactions_limit_discussions: 200
          plugin_reactions_limit_discussions_comments: 200
          plugin_reactions_display: relative
          plugin_reactions_details: count, percentage

      - name: Notable contribution metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Eliminater74
          filename: metrics.notable.svg
          template: classic
          base: ""
          config_timezone: America/New_York
          optimize: yes
          plugins_errors_fatal: no

          plugin_notable: yes
          plugin_notable_indepth: yes
          plugin_notable_repositories: yes
          plugin_notable_types: commit, pull_request, issue
          plugin_notable_self: yes

      - name: People metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Eliminater74
          filename: metrics.people.svg
          template: classic
          base: ""
          config_timezone: America/New_York
          optimize: yes
          plugins_errors_fatal: no

          plugin_people: yes
          plugin_people_types: followers, following
          plugin_people_limit: 24
          plugin_people_size: 28

      - name: Recently starred repositories metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Eliminater74
          filename: metrics.stars.svg
          template: classic
          base: ""
          config_timezone: America/New_York
          optimize: yes
          plugins_errors_fatal: no

          plugin_stars: yes
          plugin_stars_limit: 6

      - name: Star lists metrics
        uses: lowlighter/metrics@latest
        with:
          token: NOT_NEEDED
          user: Eliminater74
          filename: metrics.starlists.svg
          template: classic
          base: ""
          config_timezone: America/New_York
          optimize: yes
          plugins_errors_fatal: no

          plugin_starlists: yes
          plugin_starlists_limit: 4
          plugin_starlists_limit_repositories: 3
          plugin_starlists_languages: yes
          plugin_starlists_limit_languages: 8

      - name: Discussions metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Eliminater74
          filename: metrics.discussions.svg
          template: classic
          base: ""
          config_timezone: America/New_York
          optimize: yes
          plugins_errors_fatal: no

          plugin_discussions: yes
          plugin_discussions_categories: yes
          plugin_discussions_categories_limit: 8

      - name: Gists metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Eliminater74
          filename: metrics.gists.svg
          template: terminal
          base: ""
          config_timezone: America/New_York
          optimize: yes
          plugins_errors_fatal: no

          plugin_gists: yes

      - name: Repository traffic metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Eliminater74
          filename: metrics.traffic.svg
          template: terminal
          base: repositories
          config_timezone: America/New_York
          optimize: yes
          plugins_errors_fatal: no

          plugin_traffic: yes

      - name: Skyline metrics
        uses: lowlighter/metrics@latest
        with:
          token: NOT_NEEDED
          user: Eliminater74
          filename: metrics.skyline.svg
          template: classic
          base: ""
          config_timezone: America/New_York
          optimize: yes
          plugins_errors_fatal: no

          plugin_skyline: yes
          plugin_skyline_year: current-year
          plugin_skyline_frames: 60
          plugin_skyline_quality: 0.7
