name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # Main profile card
      - name: Main profile metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Eliminater74
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/New_York

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_threshold: C

          plugin_activity: yes
          plugin_activity_limit: 8
          plugin_activity_days: 14
          plugin_activity_filter: all

          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_facts: yes

          plugin_repositories: yes
          plugin_repositories_featured: |
            Eliminater74/Eliminater74

      # Language breakdown
      - name: Language metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Eliminater74
          filename: metrics.languages.svg
          template: classic
          base: ""
          config_timezone: America/New_York

          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used, recently-used
          plugin_languages_limit: 10
          plugin_languages_threshold: 0%

      # Contribution calendar
      - name: Calendar metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Eliminater74
          filename: metrics.calendar.svg
          template: classic
          base: ""
          config_timezone: America/New_York

          plugin_calendar: yes
          plugin_calendar_limit: 1

      # Notable repos / org contributions
      - name: Notable contribution metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Eliminater74
          filename: metrics.notable.svg
          template: classic
          base: ""
          config_timezone: America/New_York

          plugin_notable: yes
          plugin_notable_indepth: yes
          plugin_notable_repositories: yes
          plugin_notable_types: commit, pull_request, issue
          plugin_notable_self: yes

      # Follow-up / people / network
      - name: People metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Eliminater74
          filename: metrics.people.svg
          template: classic
          base: ""
          config_timezone: America/New_York

          plugin_people: yes
          plugin_people_types: followers, following
          plugin_people_limit: 24
          plugin_people_size: 28

      # Stars / interests
      - name: Stars metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Eliminater74
          filename: metrics.stars.svg
          template: classic
          base: ""
          config_timezone: America/New_York

          plugin_stars: yes
          plugin_stars_limit: 4
